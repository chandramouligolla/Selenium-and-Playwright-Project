# Locust Configuration — Banking Load Test Scenarios
# =====================================================
# Usage: locust --config=locust.conf

# Default host (override with --host flag)
host = https://api.yourbank.com

# Logging
loglevel = INFO
logfile = reports/locust/locust.log

# HTML report output
html = reports/locust/locust_report.html

# Default scenario: 500 users, ramp up 50/sec, run 10 minutes
# Override via CLI: locust -u 100 -r 10 --run-time 5m
users = 500
spawn-rate = 50
run-time = 10m
headless = false
