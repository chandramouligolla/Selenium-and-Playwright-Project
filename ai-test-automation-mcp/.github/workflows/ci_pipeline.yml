name: 🤖 AI Test Automation — CI Pipeline

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Nightly full regression at 2am UTC

env:
  PYTHON_VERSION: "3.11"
  ALLURE_VERSION: "2.27.0"

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Lint & Static Analysis
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 black isort mypy

      - name: Run Black (code formatting)
        run: black --check .

      - name: Run Flake8 (style)
        run: flake8 . --max-line-length=120 --exclude=venv,reports

      - name: Run isort (import sorting)
        run: isort --check-only .

  # ─────────────────────────────────────────────
  # JOB 2: API Tests
  # ─────────────────────────────────────────────
  api-tests:
    name: 🔌 API Test Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run API tests
        run: |
          pytest tests/api/ \
            -v \
            --tb=short \
            -m "smoke or regression" \
            --alluredir=reports/allure-results \
            --junitxml=reports/api-results.xml
        env:
          BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}

      - name: Upload API test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: reports/

  # ─────────────────────────────────────────────
  # JOB 3: UI Tests (Playwright)
  # ─────────────────────────────────────────────
  ui-tests-playwright:
    name: 🌐 UI Tests — Playwright
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install ${{ matrix.browser }}

      - name: Run Playwright UI tests (${{ matrix.browser }})
        run: |
          pytest tests/ui/ \
            -v \
            --browser=${{ matrix.browser }} \
            -m "smoke or regression" \
            --alluredir=reports/allure-results-${{ matrix.browser }} \
            --junitxml=reports/ui-results-${{ matrix.browser }}.xml
        env:
          APP_URL: ${{ secrets.APP_URL }}

      - name: Upload UI test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-results-${{ matrix.browser }}
          path: reports/

  # ─────────────────────────────────────────────
  # JOB 4: BDD Tests (Behave)
  # ─────────────────────────────────────────────
  bdd-tests:
    name: 🥒 BDD Tests — Behave
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run BDD Scenarios
        run: |
          behave features/ \
            --no-capture \
            --tags="smoke,regression" \
            --format allure_behave.formatter:AllureFormatter \
            --outfile reports/behave-allure/
        env:
          APP_URL: ${{ secrets.APP_URL }}

      - name: Upload BDD results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bdd-test-results
          path: reports/

  # ─────────────────────────────────────────────
  # JOB 5: Quality Gate
  # ─────────────────────────────────────────────
  quality-gate:
    name: 🚦 Quality Gate
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests-playwright, bdd-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-reports/

      - name: Check Quality Gate thresholds
        run: |
          python scripts/quality_gate_check.py \
            --api-results all-reports/api-test-results/ \
            --ui-results all-reports/ui-results-chromium/ \
            --min-pass-rate 95 \
            --fail-on-breach

      - name: Generate Allure Report
        run: |
          npm install -g allure-commandline
          allure generate all-reports/ -o allure-report/ --clean

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Comment PR with test summary
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Quality Gate Passed | View [Allure Report](https://chandramouligolla.github.io/ai-test-automation-mcp)'
            })
